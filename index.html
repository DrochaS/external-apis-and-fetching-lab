<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Alerts - US State Alerts</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ US Weather Alerts</h1>
            <p>Get current watches, warnings, and advisories for any US state</p>
        </header>

        <div class="search-section">
            <input 
                type="text" 
                id="stateInput" 
                placeholder="Enter state abbreviation"
                maxlength="2"
                autocomplete="off"
            >
            <button id="fetchAlertsBtn">Get Weather Alerts</button>
        </div>

        <div id="error-message" class="error-message hidden"></div>
        <div id="loading-indicator" class="loading hidden">
            <div class="spinner"></div>
            <p>Fetching weather alerts...</p>
        </div>
        <div id="alerts-container" class="alerts-container">
            <div id="alerts-display"></div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
